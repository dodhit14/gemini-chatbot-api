<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini AI Chatbot - Perawatan Tanaman</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="chat-container">

        <header class="chat-header">
            🌱 Gemini AI Chatbot - Perawatan Tanaman
        </header>

        <main id="chat-box">
          <!-- body chatbot -->
        </main>

        <form id="chat-form" autocomplete="off">

            <input
                type="text"
                id="user-input"
                placeholder="Tanyakan sesuatu tentang tanaman..."
                required
            />

            <button type="submit">
                Kirim
            </button>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
